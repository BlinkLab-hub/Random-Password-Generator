        <article class="including-characters">
            <section>
                <input type="checkbox" name="include" id="numbers"><label for="numbers">Numbers</label>
            </section>
            <section>
                <input type="checkbox" name="include" id="uppercase"><label for="uppercase">Uppercase
                </label>
            </section>
            <section>
                <input type="checkbox" name="include" id="lowercase"><label for="lowercase">Lowercase</label>
            </section>
            <section>
                <input type="checkbox" name="include" id="symbols">
                <label for="symbols">Symbols</label>
            </section>
        </article>
        <button id="generateButton" onclick="generate()"><svg viewBox="0 0 384 512" id="padlock-logo">
